- name: Ensure manifest dir exists
  ansible.builtin.file:
    path: /opt/digitafrica/k8s
    state: directory
    mode: "0755"
  when: tier1_enable_k3s | bool

- name: Stage seed notebooks on Tier-1 node
  ansible.builtin.copy:
    src: files/notebooks/
    dest: /opt/digitafrica/k8s-notebooks/
    mode: "0644"
  when: tier1_enable_k3s | bool

- name: Stage Traefik redirect-slash middleware
  ansible.builtin.copy:
    src: files/05-traefik-middleware.yaml
    dest: /opt/digitafrica/k8s/05-traefik-middleware.yaml
    mode: "0644"
  when: tier1_enable_k3s | bool

- name: Render JupyterHub Helm values
  ansible.builtin.template:
    src: templates/jhub-values.yaml.j2
    dest: /opt/digitafrica/k8s/jhub-values.yaml
    mode: "0644"
  when: tier1_enable_k3s | bool

- name: Install helm if missing
  ansible.builtin.shell: |
    set -e
    if ! command -v helm >/dev/null 2>&1; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
    helm version
  args:
    executable: /bin/bash
  when: tier1_enable_k3s | bool

- name: Ensure namespace exists
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    k3s kubectl get ns {{ digitafrica_namespace }} >/dev/null 2>&1 || k3s kubectl create ns {{ digitafrica_namespace }}
  args:
    executable: /bin/bash
  when: tier1_enable_k3s | bool

# When servicelb is disabled, Traefik's LoadBalancer service stays <pending>.
# Patching externalIPs makes kube-proxy route host traffic on port 80/443 to Traefik.
- name: Wait for Traefik service to exist before patching externalIPs
  ansible.builtin.shell: |
    set -e
    for i in $(seq 1 60); do
      k3s kubectl -n kube-system get svc traefik >/dev/null 2>&1 && exit 0
      sleep 5
    done
    echo "Timed out waiting for Traefik service" && exit 1
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - tier1_enable_k3s | bool
    - k3s_disable_servicelb | default(false) | bool

- name: Assign node IP as externalIP on Traefik service (servicelb disabled)
  ansible.builtin.shell: |
    set -e
    k3s kubectl -n kube-system patch svc traefik --type=merge \
      -p "{\"spec\":{\"externalIPs\":[\"{{ ansible_host | default(inventory_hostname) }}\"]}}"
  args:
    executable: /bin/bash
  when:
    - tier1_enable_k3s | bool
    - k3s_disable_servicelb | default(false) | bool
  changed_when: false

- name: Add JupyterHub helm repo and update
  ansible.builtin.shell: |
    set -e
    helm repo add jupyterhub https://hub.jupyter.org/helm-chart/ || true
    helm repo update
  args:
    executable: /bin/bash
  when: tier1_enable_k3s | bool

# remove previous non-helm resources (safe if they don't exist)
- name: Cleanup previous manual JupyterHub resources (best-effort)
  ansible.builtin.shell: |
    set -e
    k3s kubectl -n {{ digitafrica_namespace }} delete all,cm,secret,role,rolebinding,sa \
      -l app=jupyterhub --ignore-not-found || true
  args:
    executable: /bin/bash
  when: tier1_enable_k3s | bool

- name: Apply Traefik redirect-slash middleware
  ansible.builtin.shell: |
    set -e
    k3s kubectl apply -f /opt/digitafrica/k8s/05-traefik-middleware.yaml
  args:
    executable: /bin/bash
  when: tier1_enable_k3s | bool

- name: Install/upgrade JupyterHub via Helm (NodePort)
  ansible.builtin.shell: |
    set -e
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    helm upgrade --install jhub jupyterhub/jupyterhub \
      --namespace {{ digitafrica_namespace }} \
      --timeout 15m0s \
      -f /opt/digitafrica/k8s/jhub-values.yaml
  args:
    executable: /bin/bash
  when: tier1_enable_k3s | bool

- name: List resources created by Helm release (debug)
  ansible.builtin.shell: |
    set -e
    k3s kubectl -n {{ digitafrica_namespace }} get deploy,sts,po,svc -o wide
    echo "----"
    helm -n {{ digitafrica_namespace }} status jhub || true
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: Wait for all JupyterHub deployments from release to finish rolling out
  ansible.builtin.shell: |
    set -e
    # Find deployments created by this helm release
    deps=$(k3s kubectl -n {{ digitafrica_namespace }} get deploy \
      -l app.kubernetes.io/instance=jhub \
      -o jsonpath='{range .items[*]}{.metadata.name}{" "}{end}')
    if [ -z "$deps" ]; then
      echo "No deployments found for release jhub in namespace {{ digitafrica_namespace }}"
      k3s kubectl -n {{ digitafrica_namespace }} get all
      exit 1
    fi

    for d in $deps; do
      echo "Waiting for deployment/$d"
      k3s kubectl -n {{ digitafrica_namespace }} rollout status deploy/$d --timeout=600s
    done
  args:
    executable: /bin/bash
  become: true

- name: Show access URL
  ansible.builtin.debug:
    msg:
      - "JupyterHub URL: {{ tier1.jhub.oidc.landing_page }}/"
  when: tier1_enable_k3s | bool
