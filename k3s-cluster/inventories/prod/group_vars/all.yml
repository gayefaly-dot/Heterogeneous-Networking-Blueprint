# Common
timezone: "Europe/Athens"

tier1_enable_k3s: true

k3s_version: "v1.30.4+k3s1"

# Cluster settings (Tier-1 as server)
k3s_server_host: "digitafrica-edge-node1"
k3s_cluster_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"
k3s_disable_traefik: false      # false = Traefik Ingress enabled | true = disabled
k3s_disable_servicelb: "{{ not k3s_disable_traefik | bool }}"  # auto-derived: servicelb off when Traefik is on
#k3s_cache: http://docker-cache